name: Pre-Match Checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    name: Lint, Format & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Tactics Check (Lint)
        run: npm run lint:check

      - name: Formation Check (Format)
        run: npm run format:check

      - name: Training Session (Unit Tests)
        run: npm run test:unit

      # Re-enable once Phase 1+ has lifted coverage to the configured thresholds
      # (60% all metrics in vite.config.js).
      # - name: Medical Check (Coverage Thresholds)
      #   run: npm run test:coverage

<!doctype html>
<html lang="de">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#f5f7fa" />
		<script>
			(() => {
				var t = localStorage.getItem('theme');
				var dark = t === 'dark' || ((!t || t === 'system') && window.matchMedia('(prefers-color-scheme: dark)').matches);
				if (dark) {
					document.documentElement.classList.add('dark');
					document.querySelector('meta[name="theme-color"]').setAttribute('content', '#0f1219');
				}
			})();
		</script>
		<meta name="description" content="RasenBürosport Leipzig – Office Sports Tracker" />

		<!-- PWA -->
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/logo.png" />

		<!-- iOS PWA support -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="RasenBürosport" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
